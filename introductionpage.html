<!DOCTYPE html>
<html>
<head>
    <title>Atul | Introduction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f0f2f5;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        header h1 {
            margin-bottom: 5px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .hero img {
            width: 140px;
            border-radius: 50%;
            margin-top: 15px;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            padding: 10px 15px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

<header>
    <h1>Atul Prajapati</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<div class="hero">
    <h2>Hello 👋</h2>
    <p>I am learning Web Development</p>
    <img src="https://via.placeholder.com/140">
</div>

<section id="about">
    <div class="card">
        <h2>About Me</h2>
        <p id="aboutText">I am a student who loves coding.</p>
        <button onclick="changeText()">Know More</button>
    </div>
</section>

<section id="skills">
    <div class="card">
        <h2>My Skills</h2>
        <p>HTML, CSS, JavaScript</p>
        <p>Basic C++, Linux</p>
    </div>
</section>

<section id="contact">
    <div class="card">
        <h2>Contact</h2>
        <p>Email: atulprajapati070@gmail.com</p>
        <p>Phone: 8980253071</p>
    </div>
</section>

<footer>
    <p>© 2026 Atul | All Rights Reserved</p>
</footer>

<script>
    function changeText() {
        document.getElementById("aboutText").innerHTML =
        "I enjoy building websites 💻, learning Linux 🐧 and exploring new technologies 🚀";
    }
</script>

</body>
</html>
